<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Physique — Carnet de bord</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
</head>
<body>
  <script src="nav.js"></script>
  <script>injectNav('physique');</script>

  <main>
    <div class="page-header">
      <h1>Physique du modèle</h1>
      <p>Lois physiques fondamentales, équations et explications utilisées dans le modèle.</p>
    </div>
    <div id="entries"><p class="empty">Chargement…</p></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

  <script>
    async function loadPhysique() {
      var container = document.getElementById('entries');
      try {
        var res = await fetch('content/physique.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        var data = await res.json();
        var entries = data.entries || [];

        if (entries.length === 0) {
          container.innerHTML = '<p class="empty">Aucune loi physique ajoutée pour l\'instant.</p>';
          return;
        }

        container.innerHTML = '';
        entries.forEach(function (entry) {
          var section = document.createElement('section');
          section.className = 'card';

          var html = '<h2>' + escHtml(entry.title || '') + '</h2>';

          /* Équation principale en display mode */
          if (entry.equation && entry.equation.trim()) {
            html +=
              '<div class="math-block">' +
              katex.renderToString(entry.equation, { displayMode: true, throwOnError: false }) +
              '</div>';
          }

          /* Corps (Markdown avec possibilité d'équations $...$ inline) */
          html += '<div class="entry-body">' + marked.parse(entry.body || '') + '</div>';

          section.innerHTML = html;
          container.appendChild(section);
        });

        /* Rendu des équations inline restantes dans le corps Markdown */
        renderMathInElement(container, {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '$',  right: '$',  display: false },
          ],
          throwOnError: false,
        });

      } catch (e) {
        container.innerHTML =
          '<p class="error-msg">Impossible de charger les lois physiques : ' + e.message + '</p>';
      }
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    loadPhysique();
  </script>
</body>
</html>
