<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Python — Carnet de bord</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
</head>
<body>
  <script src="nav.js"></script>
  <script>injectNav('code');</script>

  <main>
    <div class="page-header">
      <h1>Code Python</h1>
      <p>Extraits commentés du programme — fonctions clés et choix d'implémentation.</p>
    </div>
    <div id="entries"><p class="empty">Chargement…</p></div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>

  <script>
    async function loadCode() {
      var container = document.getElementById('entries');
      try {
        var res = await fetch('content/code.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        var data = await res.json();
        var entries = data.entries || [];

        if (entries.length === 0) {
          container.innerHTML = '<p class="empty">Aucun extrait de code ajouté pour l\'instant.</p>';
          return;
        }

        container.innerHTML = '';
        entries.forEach(function (entry) {
          var card = document.createElement('article');
          card.className = 'card';

          var codeStr = typeof entry.code === 'object' ? (entry.code.code || '') : (entry.code || '');

          var html =
            '<div class="snippet-header">' +
              '<h2 style="margin:0">' + escHtml(entry.title || '') + '</h2>' +
              '<span class="tag">Python</span>' +
            '</div>';

          if (entry.description) {
            html += '<p class="snippet-desc">' + escHtml(entry.description) + '</p>';
          }

          html += '<pre><code class="language-python">' + escHtml(codeStr) + '</code></pre>';

          card.innerHTML = html;
          container.appendChild(card);
        });

        /* Coloration syntaxique */
        container.querySelectorAll('pre code').forEach(function (el) {
          hljs.highlightElement(el);
        });

      } catch (e) {
        container.innerHTML =
          '<p class="error-msg">Impossible de charger le code : ' + e.message + '</p>';
      }
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    loadCode();
  </script>
</body>
</html>
