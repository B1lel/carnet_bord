# netlify.toml — Configuration Netlify
# Ce fichier doit être à la racine du dépôt GitHub.

[build]
  # Pas de commande de build : site 100% statique
  publish = "."

# En-têtes de sécurité pour toutes les pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Nécessaire pour que Netlify Identity redirige correctement après login
[[redirects]]
  from  = "/admin/"
  to    = "/admin/index.html"
  status = 200

# Redirections legacy : anciennes URLs à la racine → nouvelles URLs dans /pages/
[[redirects]]
  from  = "/journal.html"
  to    = "/pages/journal.html"
  status = 301

[[redirects]]
  from  = "/physique.html"
  to    = "/pages/physique.html"
  status = 301

[[redirects]]
  from  = "/code.html"
  to    = "/pages/code.html"
  status = 301

[[redirects]]
  from  = "/resultats.html"
  to    = "/pages/resultats.html"
  status = 301

[[redirects]]
  from  = "/biblio.html"
  to    = "/pages/biblio.html"
  status = 301
