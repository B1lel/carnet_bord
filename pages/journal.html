<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journal — Carnet de bord</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
</head>
<body>
  <script src="../assets/js/nav.js"></script>
  <script>injectNav('journal');</script>

  <main>
    <div class="page-header">
      <h1>Journal de bord</h1>
      <p>Suivi chronologique de ma progression — de la plus récente à la plus ancienne.</p>
    </div>
    <div id="entries"><p class="empty">Chargement…</p></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>

  <script>
    async function loadJournal() {
      var container = document.getElementById('entries');
      try {
        var res = await fetch('../content/journal.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        var data = await res.json();
        var entries = (data.entries || []).slice().reverse();

        if (entries.length === 0) {
          container.innerHTML = '<p class="empty">Aucune entrée pour l\'instant.</p>';
          return;
        }

        container.innerHTML = '';
        entries.forEach(function (entry) {
          var card = document.createElement('article');
          card.className = 'card';

          var dateStr = entry.date ? entry.date.split('T')[0] : '';
          var html =
            '<div class="card-date">' + dateStr + '</div>' +
            '<h2>' + escHtml(entry.title || '(sans titre)') + '</h2>';

          var blocks = entry.blocks || [];
          blocks.forEach(function (block) {
            html += '<div class="activity-block">';

            /* Badges collaborateurs */
            if (block.collaborators && block.collaborators.length > 0) {
              html += '<div class="collab-tags">';
              block.collaborators.forEach(function (name) {
                var slug = name.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-');
                html += '<span class="collab-tag collab-' + slug + '">' + escHtml(name) + '</span>';
              });
              html += '</div>';
            }

            var imgs = (block.images || []).filter(function (img) { return img.src; });

            if (imgs.length === 1) {
              /* 1 image : layout côte à côte */
              var img = imgs[0];
              html += '<div class="block-split">';
              html += '<div class="entry-body block-text">' + marked.parse(block.body || '') + '</div>';
              html += '<div class="block-img-side">';
              html += '<img src="' + escAttr(img.src) + '" alt="' + escAttr(img.caption || '') + '" loading="lazy" />';
              if (img.caption) html += '<div class="img-caption">' + escHtml(img.caption) + '</div>';
              html += '</div></div>';
            } else {
              /* 0 ou plusieurs images : texte pleine largeur */
              html += '<div class="entry-body">' + marked.parse(block.body || '') + '</div>';
              if (imgs.length > 1) {
                html += '<div class="img-grid">';
                imgs.forEach(function (img) {
                  html += '<div class="img-card"><img src="' + escAttr(img.src) + '" alt="' + escAttr(img.caption || '') + '" loading="lazy" />';
                  if (img.caption) html += '<div class="img-caption">' + escHtml(img.caption) + '</div>';
                  html += '</div>';
                });
                html += '</div>';
              }
            }

            html += '</div>'; /* .activity-block */
          });

          card.innerHTML = html;
          container.appendChild(card);
        });

        renderMathInElement(container, {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '$',  right: '$',  display: false },
          ],
          throwOnError: false,
        });

        container.querySelectorAll('pre code').forEach(function (el) {
          hljs.highlightElement(el);
        });

      } catch (e) {
        container.innerHTML =
          '<p class="error-msg">Impossible de charger le journal : ' + e.message + '</p>';
      }
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
    function escAttr(str) { return escHtml(str); }

    loadJournal();
  </script>
</body>
</html>
